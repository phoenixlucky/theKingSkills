<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The King Skills — AI Agent Skill 索引</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>👑 The King Skills</h1>
      <p class="subtitle">收集热门且好用的 AI Agent Skill，指导各种 AI Agent 快速一键安装配置</p>
      <p class="meta">共收录 <strong id="totalCount">0</strong> 个 Skill，覆盖 <strong>6</strong> 大分类</p>
    </div>
  </header>

  <main class="container">
    <!-- Controls: Filter + Search -->
    <section class="controls">
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-cat="all">🏠 全部</button>
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索技能名称或描述…" autocomplete="off">
      </div>
    </section>

    <!-- Stats bar -->
    <section class="stats-bar">
      <span>已选 <strong id="selectedCount">0</strong> 个 Skill</span>
      <button class="btn btn-primary" id="generateBtn">📋 生成安装指令</button>
      <button class="btn btn-secondary" id="clearBtn">清除选择</button>
    </section>

    <!-- Skill cards grid -->
    <section class="skills-grid" id="skillsGrid">
      <!-- Rendered by JS -->
    </section>

    <!-- Install instructions output -->
    <section class="output-section" id="outputSection" style="display:none;">
      <h2>📋 安装指令</h2>
      <p class="output-hint">将下方内容直接提供给 AI Agent：</p>
      <textarea id="outputText" readonly rows="12"></textarea>
      <button class="btn btn-primary" id="copyBtn">📄 复制到剪贴板</button>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>由 <a href="https://github.com/phoenixlucky/theKingSkills" target="_blank">theKingSkills</a> 项目维护 · 欢迎提交 Issue 和 PR</p>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="js/script.js"></script>
</body>
</html>
